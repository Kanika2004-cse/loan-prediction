<!DOCTYPE html>
<html>
<head>
    <title>Loan Prediction</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a; /* dark blue */
            color: #e2e8f0;
            text-align: center;
            padding-top: 60px;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            margin: auto;
            width: 320px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
        }

        h2 {
            color: #38bdf8; /* neon blue */
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            background: #0f172a;
            color: white;
            border: 1px solid #38bdf8;
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            width: 95%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            background: #38bdf8;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0ea5e9;
        }

        h3 {
            margin-top: 20px;
            color: #22c55e;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>💻 Loan Approval System</h2>
    <p>Developed by Kanika</p>

    <form action="/predict" method="post">
        <input type="number" name="income" placeholder="Applicant Income" required>
        <input type="number" name="loan" placeholder="Loan Amount" required>
        <input type="number" name="credit" placeholder="Credit History (0/1)" required>

        <select name="education">
            <option value="1">Graduate</option>
            <option value="0">Not Graduate</option>
        </select>

        <select name="married">
            <option value="1">Married</option>
            <option value="0">Not Married</option>
        </select>

        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>
</div>

</body>
</html>
